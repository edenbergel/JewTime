<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Navy background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#D4930F" stroke-width="3" stroke-opacity="0.25"/>

  <!-- Star of David — upward triangle -->
  <!-- Center (256,256), circumradius 155: top=(256,101), bottom-right=(390,334), bottom-left=(122,334) -->
  <polygon
    points="256,101 390,334 122,334"
    fill="#D4930F"
    fill-opacity="0.12"
    stroke="#D4930F"
    stroke-width="16"
    stroke-linejoin="round"
  />

  <!-- Star of David — downward triangle -->
  <!-- bottom=(256,411), top-right=(390,179), top-left=(122,179) -->
  <polygon
    points="256,411 390,179 122,179"
    fill="#D4930F"
    fill-opacity="0.12"
    stroke="#D4930F"
    stroke-width="16"
    stroke-linejoin="round"
  />

  <!-- Center jewel -->
  <circle cx="256" cy="256" r="22" fill="#0f172a"/>
  <circle cx="256" cy="256" r="16" fill="#D4930F"/>
  <circle cx="256" cy="256" r="7"  fill="#fde68a"/>
</svg>
